sonar.projectKey=employee-management-system
sonar.projectName=EmployeeManagementSystem
sonar.sourceEncoding=UTF-8

sonar.sources=src/main/java
sonar.tests=src/test/java

# Analyze and show coverage only for service layer files
sonar.inclusions=src/main/java/com/example/employeemanagementsystem/service/**/*.java
sonar.coverage.inclusions=src/main/java/com/example/employeemanagementsystem/service/**/*.java
sonar.test.inclusions=src/test/java/com/example/employeemanagementsystem/service/**/*Test.java,src/test/java/com/example/employeemanagementsystem/service/**/*IntegrationTest.java

# JaCoCo XML report generated by Maven
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# JUnit reports generated by surefire/failsafe
sonar.junit.reportPaths=target/surefire-reports,target/failsafe-reports
