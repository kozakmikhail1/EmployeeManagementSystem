name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: ./mvnw -B -V verify

      - name: SonarCloud analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=kozakmikhail1 \
            -Dsonar.projectKey=kozakmikhail1_EmployeeManagementSystem \
            -Dsonar.inclusions='src/main/java/com/example/employeemanagementsystem/service/**/*.java' \
            -Dsonar.coverage.inclusions='src/main/java/com/example/employeemanagementsystem/service/**/*.java' \
            -Dsonar.coverage.jacoco.xmlReportPaths='target/site/jacoco/jacoco.xml'

  docker-build:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t employee-management-system:ci .

  deploy:
    needs: docker-build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set. Skipping deploy."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

  healthcheck:
    needs: deploy
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment health
        env:
          APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
        run: |
          if [ -z "$APP_HEALTHCHECK_URL" ]; then
            echo "APP_HEALTHCHECK_URL secret is not set. Skipping healthcheck."
            exit 0
          fi

          for i in $(seq 1 30); do
            body=$(curl -fsS "$APP_HEALTHCHECK_URL" || true)
            if echo "$body" | grep -q '"status":"UP"'; then
              echo "Healthcheck passed"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 10s"
            sleep 10
          done

          echo "Healthcheck failed"
          exit 1
